name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload the zip to (e.g. v0.0.4)'
        required: true

permissions:
  contents: write

jobs:
  publish-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - name: Read tools from mise.toml 🛠
        id: mise
        uses: yshrsmz/action-mise-values@bbf51a0cc5792662fd3e97a1ca453c036969dd3e # v0.2.5

      - name: Setup node env 🏗
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ fromJson(steps.mise.outputs.tools).node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Zip
        run: pnpm zip

      - name: Upload zip to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG" .output/*.zip --clobber --repo "$GITHUB_REPOSITORY"
